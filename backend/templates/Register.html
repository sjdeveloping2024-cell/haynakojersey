<!DOCTYPE html>
<html>
<head>
<title>Register - Pick-A-Book Library</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a2540,#1e3c72);
}

.register-container{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

.register-container h2{
margin-bottom:20px;
color:#0a2540;
}

.register-container input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
transition:0.3s;
}

.register-container input:focus{
border-color:#007bff;
outline:none;
box-shadow:0 0 5px rgba(0,123,255,0.5);
}

.register-container button{
width:100%;
padding:12px;
margin-top:10px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.register-container button:hover{
background:#0056b3;
}

.back-login{
display:block;
margin-top:15px;
text-decoration:none;
color:#007bff;
font-size:14px;
}

.back-login:hover{
text-decoration:underline;
}

.flash-message{
background:#f8d7da;
color:#721c24;
padding:10px;
border-radius:5px;
margin-bottom:15px;
}
</style>
</head>
<body>

<div class="register-container">
<h2>📚 Librarian Registration</h2>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="flash-message">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

<form action="{{ url_for('register_process') }}" method="POST">
<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Register</button>
</form>

<a href="{{ url_for('login_page') }}" class="back-login">← Back to Login</a>
</div>

</body>
</html>
